<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My dog</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrapper">
    <header class="header">
      <h1>Kennel Iz Vladeniya Akelo</h1>
      <img src="img/kennel.png" width="100" alt="kennel"/>
    </header>
    <main class="container">
      <div class="content">
        <div class="info">
          <h2>Dame: Nuar-Di Iz Vladeniya Akelo</h2>
          <button class="button">Pedigree</button>
          <button class="button">Test</button>
        </div>
        <div class="image">
          <button class="foto">
            <img src="img/arrow-left.svg" width="20" alt="left"/>
          </button>
          <img src="img/2.jpg" width="300" alt="Nura"/>
          <button class="foto">
            <img src="img/right-arrow.svg" width="20" alt="right"/>
          </button>
        </div>
      </div>
      <div class="content">
        <div class="info">
          <h2>Sire: Diamond Brave Heart Apricote Mood</h2>
          <button class="button">Pedigree</button>          
        </div>
        <div class="image">
          <button class="foto">
            <img src="img/arrow-left.svg" width="20" alt="left"/>
          </button>
          <img src="img/sir3.jpg" width="300" alt="Sire"/>
          <button class="foto">
            <img src="img/right-arrow.svg" width="20" alt="right"/>
          </button>
        </div>
      </div>
      <div class="info">
        <h2>Puppies new litter</h2>
        <span>date of birth: 05.05.2026</span>
      </div>
      <div class="content">
        <div class="info">
          <h2>females</h2>                    
        </div>
        <div class="image">
          <button class="foto">
            <img src="img/arrow-left.svg" width="20" alt="left"/>
          </button>
          <img src="img/rida1.jpg" width="300" alt="Rida"/>
          <button class="foto">
            <img src="img/right-arrow.svg" width="20" alt="right"/>
          </button>
        </div>
      </div>
      <div class="content">
        <div class="info">
          <h2>males</h2>                    
        </div>
        <div class="image">
          <button class="foto">
            <img src="img/arrow-left.svg" width="20" alt="left"/>
          </button>
          <img src="img/mal3.34.jpg" width="300" alt="Overt"/>
          <button class="foto">
            <img src="img/right-arrow.svg" width="20" alt="right"/>
          </button>
        </div>
      </div>
    </main>
    <footer class="footer">
      <div class="contakt">
        <img src="img/icon-phone.svg" width="20" alt="phone"/>
        <span>+38 063 602 2482</span>
      </div>
      <div class="contakt">
        <img src="img/icon-email.svg" width="20" alt="email"/>
        <span>iii888jji@gmail.com</span>
      </div>
      <div class="contakt">
        <img src="img/icon-marker.png" width="20" alt="phone"/>
        <span>Borova, Kyiv reg., Ukraine 08520</span>
      </div>
    </footer>      
  </div>  
</body>
</html>
